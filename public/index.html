<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Emergency System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Login/Register Screen -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <div class="logo">
                    <i class="fas fa-heartbeat"></i>
                    <h1>Medical Emergency</h1>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showTab('login')">Login</button>
                    <button class="tab-btn" onclick="showTab('register')">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                
                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <input type="tel" id="reg-phone" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tint"></i> Blood Group</label>
                        <select id="reg-blood">
                            <option value="">Select</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Main Dashboard -->
        <div id="dashboard-screen" class="screen">
            <header class="header">
                <div class="header-left">
                    <h2><i class="fas fa-heartbeat"></i> Emergency System</h2>
                </div>
                <div class="header-right">
                    <span id="user-name"></span>
                    <button onclick="logout()" class="btn btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>
            
            <!-- Emergency SOS Button -->
            <div class="sos-container">
                <button id="sos-btn" class="sos-button" onclick="triggerEmergency()">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>SOS</span>
                    <small>Press for Emergency</small>
                </button>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="action-card" onclick="showScreen('facilities')">
                    <i class="fas fa-hospital"></i>
                    <span>Nearby Facilities</span>
                </button>
                <button class="action-card" onclick="showScreen('ambulance')">
                    <i class="fas fa-ambulance"></i>
                    <span>Request Ambulance</span>
                </button>
                <button class="action-card" onclick="showScreen('records')">
                    <i class="fas fa-file-medical"></i>
                    <span>Medical Records</span>
                </button>
                <button class="action-card" onclick="showScreen('first-aid')">
                    <i class="fas fa-first-aid"></i>
                    <span>First Aid Guide</span>
                </button>
            </div>
            
            <!-- Recent Alerts -->
            <div class="section">
                <h3><i class="fas fa-bell"></i> Recent Alerts</h3>
                <div id="recent-alerts" class="alerts-list">
                    <p class="text-muted">No recent alerts</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Emergency Modal -->
    <div id="emergency-modal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-exclamation-triangle"></i> Emergency Alert</h3>
            <form id="emergency-form">
                <div class="form-group">
                    <label>Emergency Type</label>
                    <select id="alert-type" required>
                        <option value="medical">Medical Emergency</option>
                        <option value="accident">Accident</option>
                        <option value="cardiac">Cardiac Arrest</option>
                        <option value="breathing">Breathing Problem</option>
                        <option value="injury">Severe Injury</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Severity</label>
                    <select id="severity" required>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-paper-plane"></i> Send Alert
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
